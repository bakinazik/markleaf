<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Markleaf</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
    :root {
      --background-color: #fff;
      --text-color: #111;
      --primary-button-background: #ededf2;
      --primary-button-text: #111;
      --secondary-button-background: #ddd;
      --secondary-button-text: #111;
      --link-background: #ededf2;
      --link-color: #111;
      --box-shadow: 0 4px 25px rgb(179 179 179 / 35%);
      --hover-color-edit: #757575;
      --hover-color-remove: #ff5c5c;
      --border-color: #ddd;
      --form-background: #eee;
      --input-background: transparent;
      --input-border-color: #ddd;
      --input-text-color: #111;
      --placeholder-color: #aaa;
      --scrollbar-width: 0px;
      --context-menu-background: #ededf2;
      --context-menu-item-hover: #f0f0f0;
      --font-family: sans-serif;
      --padding-small: 9px 12px;
      --padding-medium: 10px;
      --border-radius: 10px;
      --gap-small: 10px;
      --gap-medium: 15px;
      --icon-size-button: 30px;
      --card-bg: #f0f0f5;
      --card-hover-bg: #e4e4ec;
    }

    @media (prefers-color-scheme: dark) {
        :root {
            --background-color: #222;
            --text-color: #ffffff;
            --primary-button-background: #333;
            --primary-button-text: #ccc;
            --secondary-button-background: #444;
            --secondary-button-text: #ccc;
            --link-background: #333;
            --link-color: #ccc;
            --border-color: #444;
            --box-shadow: 0 4px 25px rgba(0, 0, 0, 0.35);
            --form-background: #333;
            --input-background: transparent;
            --input-border-color: #444;
            --input-text-color: #fff;
            --placeholder-color: #aaa;
            --context-menu-background: #333;
            --context-menu-item-hover: #444;
            --card-bg: #2e2e2e;
            --card-hover-bg: #383838;
        }
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      text-decoration: none;
      outline: none;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }

    ul, #settingsPanel {
        scrollbar-width: thin;
        scrollbar-color: var(--border-color) transparent;
    }

    ul::-webkit-scrollbar,
    #settingsPanel::-webkit-scrollbar {
        width: 8px;
        height: 8px;
    }

    ul::-webkit-scrollbar-thumb,
    #settingsPanel::-webkit-scrollbar-thumb {
        background-color: rgba(128,128,128, 0.2);
        border-radius: 10px;
        transition: background-color 0.3s;
    }

    ul::-webkit-scrollbar-thumb:hover,
    #settingsPanel::-webkit-scrollbar-thumb:hover {
        background-color: rgba(128,128,128, 0.4);
    }

    ul::-webkit-scrollbar-track,
    #settingsPanel::-webkit-scrollbar-track {
        background: transparent;
    }

    body {
        width: 300px;
        font-family: var(--font-family);
        display: flex;
        flex-direction: column;
        background-color: var(--background-color);
        color: var(--text-color);
        height: 600px;
        overflow: hidden;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: var(--gap-small);
      align-items: center;
      padding: 0 10px;
    }

    .nav {
      display: flex;
      gap: var(--gap-small);
    }

    section {
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: sticky;
        top: 0;
        margin-bottom: 0;
        z-index: 15;
        background: var(--background-color);
        padding: 10px 0px;
    }

	.search {
	    display: flex;
	    align-items: center;
	    position: relative;
	    width: 100%;
	    border: 1px solid var(--border-color);
	    border-radius: 10px;
	}

	#searchInput {
	    background: var(--input-background);
	    border: none;
	    padding: var(--padding-small);
	    border-radius: var(--border-radius);
	    color: var(--input-text-color);
	    display: block;
	    width: 100%;
	    padding-left: 40px;
	    z-index: 2;
	    font-size: 15px;
	}

    .search-svg {
      position: absolute;
      z-index: 1;
      top: 50%;
      transform: translate(-50%, -50%);
      left: 20px;
      color: var(--placeholder-color);
    }

    button {
      padding: var(--padding-small);
      border-radius: var(--border-radius);
      border: none;
      cursor: pointer;
      display: flex;
      gap: var(--gap-small);
      align-items: center;
      transition: 0.2s all;
    }

    #addBookmark,
    #createFolder,
    #emptyTrashBtn,
    #restoreAllTrashBtn{
      background: var(--primary-button-background);
      color: var(--primary-button-text);
      transition: 0.2s background;
      padding: var(--padding-small);
    }

    #addBookmark:hover,
    #createFolder:hover,
    #emptyTrashBtn:hover,
    #restoreAllTrashBtn:hover{
      background: var(--secondary-button-background);
    }

    #viewToggleBtn, #trashSelectBtn {
      color: var(--primary-button-text);
      transition: 0.2s background;
      padding: 10px;
      flex-shrink: 0;
      border: none;
      background: var(--bg);
    }

    .up-button {
        display: none;
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--link-color);
        transition: 0.2s all;
        margin: 0 10px;
    }
    
    .up-button:hover {
        background: var(--border-color);
    }
    
	.up-button:hover .shortcut {
	    background: var(--background-color);
	}
    
	.shortcut {
	    border: 1px solid var(--border-color);
	    padding: 2px 10px;
	    margin-left: auto;
	    border-radius: 7px;
	    font-family: monospace;
	    display: flex;
	    align-items: center;
	    gap: 5px;
	}

    select,
    option {
      border-radius: var(--border-radius);
      padding: var(--padding-medium);
      border-color: transparent;
      width: 100%;
    }

    select {
      padding-left: 40px;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background: var(--input-background);
      border: 1px solid var(--input-border-color);
      position: relative;
      color: var(--input-text-color);
    }

    option {
      background: var(--primary-button-background);
      color: var(--primary-button-text);
    }

    .folder {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
    }

    .folder svg {
      position: absolute;
      left: 10px;
    }

    ul {
        list-style: none;
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        overflow-x: hidden;
        height: 100%;
        margin: 0 10px 0;
        border-radius: var(--border-radius);
    }

    li {
      position: relative;
    }

    li a {
        margin: 0;
        padding: var(--padding-medium);
        display: flex;
        align-items: center;
        gap: 2px;
        background: var(--link-background);
        color: var(--link-color);
        transition: 0.2s background;
        border-bottom: 1px solid var(--border-color);
    }
    
    li:last-child > a {
        border-bottom: none;
        border-bottom-left-radius: var(--border-radius);
        border-bottom-right-radius: var(--border-radius);
    }

    li a:hover {
      background: var(--secondary-button-background);
    }

    li a img {
      border-radius: 100%;
    }

    .item-icon {
      display: flex;
      align-items: center;
    }

    .bookmark-content {
      display: flex;
      flex-direction: column;
      gap: 2px;
      overflow: hidden;
    }

    .bookmark-title {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bookmark-title[contenteditable="true"] {
      border: 1px solid var(--border-color);
      padding: 2px 5px;
      border-radius: 5px;
    }

    .bookmark-url {
      font-size: 12px;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .empty-message {
      text-align: center;
      margin-top: 20px;
      display: block;
      width: 100%;
    }

    .bookmark-buttons {
        position: absolute;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
        display: none;
        background: var(--background-color);
        border-radius: var(--border-radius);
        color: var(--link-color);
        z-index: 10;
        height: 20px;
        align-items: center;
    }
    
    a:has(.icon-tabler-folder) .bookmark-content{
        margin-right: 45px;
    }

    li:hover .bookmark-buttons,
    .bookmark-buttons.is-visible {
      display: flex;
    }

    .menu-button {
      width: var(--icon-size-button);
      height: var(--icon-size-button);
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      transition: 0.2s all;
      color: var(--secondary-button-text);
      padding: 5px;
    }

    .menu-button:hover {
      opacity: 0.8;
    }

    .context-menu {
        position: fixed;
        top: 0;
        right: 0;
        z-index: 9999999;
        display: none;
        flex-direction: column;
        border-radius: var(--border-radius);
        padding: 0;
        min-width: 225px;
        border: 1px solid var(--border-color);
        overflow: hidden;
        animation: menuFadeIn 0.15s ease-out;
        background: var(--background-color);
    }

    .context-menu.open-upwards {
        top: auto;
        bottom: 35px;
        animation: menuFadeInUp 0.15s ease-out;
    }

    @keyframes menuFadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to   { opacity: 1; transform: scale(1); }
    }

    @keyframes menuFadeInUp {
        from { opacity: 0; transform: translateY(5px) scale(0.95); }
        to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes menuFadeOut {
        from { opacity: 1; transform: scale(1); }
        to   { opacity: 0; transform: scale(0.95); }
    }

    @keyframes menuFadeOutUp {
        from { opacity: 1; transform: translateY(0) scale(1); }
        to   { opacity: 0; transform: translateY(5px) scale(0.95); }
    }

    .context-menu-item {
        display: flex;
        align-items: center;
        gap: var(--gap-small);
        padding: 8px 12px;
        cursor: pointer;
        color: var(--text-color);
        background: transparent;
        text-align: left;
        margin: 0;
        border-bottom: 1px solid var(--border-color);
        border-radius: 0;
    }
    
    .context-menu .context-menu-item:last-child{
        border-bottom: none;
    }

    .context-menu-item:hover {
      background: var(--context-menu-item-hover);
    }
    
    .folder-count {
        font-size: 12px;
        color: var(--link-color);
        background: var(--background-color);
        padding: 3px 5px;
        border-radius: 15px;
        position: absolute;
        min-width: 30px;
        text-align: center;
        max-width: 30px;
        top: 50%;
        right: 10px;
        transform: translateY(-50%);
    }
    
    .quick-actions {
        display: flex;
        gap: 5px;
        border-radius: var(--border-radius);
        overflow: hidden;
        padding: 10px;
    }

    .quick-action-btn {
        flex: 1;
        padding: 5px;
        background: var(--context-menu-background);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.2s;
        color: var(--text-color);
    }

    .quick-action-btn:hover {
      background: var(--secondary-button-background) !important;
    }

    .quick-action-btn svg {
      width: 14px;
      height: 14px;
    }

    .edit-form {
      display: none;
      flex-direction: column;
      gap: 5px;
      padding: var(--padding-medium);
      border-radius: var(--border-radius);
      background: var(--form-background);
      width: 100%;
      z-index: 10;
    }

    .edit-form input {
      border-radius: var(--border-radius);
      padding: 8px 10px;
      background: var(--input-background);
      border: 1px solid var(--input-border-color);
      color: var(--input-text-color);
    }

    .edit-form button {
      height: auto;
      padding: 7px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      transition: 0.2s all;
      width: 100%;
      margin: 8px 0 0;
      background: var(--secondary-button-background);
      color: var(--primary-button-text);
    }

    .edit-form button:hover {
      opacity: 0.8;
    }

    .modal {
      position: fixed;
      z-index: 100;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgb(25 25 25 / 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
      backdrop-filter: blur(5px);
    }
    
    .modal.active {
      opacity: 1;
      visibility: visible;
    }
    
    #openAllMessage {
        font-size: 14px;
        margin: 5px 0 0;
    }

    .modal-content {
      width: 80%;
      max-width: 300px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      color: #eee;
      transform: scale(0.7);
      transition: transform 0.3s ease;
    }

    .modal.active .modal-content {
      transform: scale(1);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    #closeCreateFolderModal, #closeMoveModal, #cancelOpenAllBtn, #cancelEmptyTrashBtn, #cancelImportBtn, #cancelRestoreAllTrashBtn {
      background: transparent;
      color: #eee;
      border: 1px solid var(--border-color);
    }

    .modal-header h3 {
      margin: 0;
      width: 100%;
    }

    .close-btn {
      color: var(--text-color);
      font-size: 24px;
      font-weight: bold;
      cursor: pointer;
      background: transparent;
      width: 24px;
      height: 24px;
      padding: 0;
    }

    .modal-list {
      list-style-type: none;
      max-height: 230px;
      overflow-y: auto;
    }

    .modal-list li {
        padding: 10px;
        cursor: pointer;
        transition: background-color 0.2s;
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--primary-button-background);
        color: var(--text-color);
        border: 1px solid transparent;
        border-radius: 0;
        border-bottom: 1px solid var(--border-color);
    }
    

    
    .modal-list li:last-child {
        border-bottom: none;
        border-bottom-left-radius: var(--border-radius);
        border-bottom-right-radius: var(--border-radius);
    }

    li.empty-message {
      background: transparent;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eee;
    }

    li.empty-message:hover {
      background: transparent !important;
    }

    .modal-list li:hover {
      background-color: var(--secondary-button-background);
    }

    .modal-list li.selected {
        background-color: var(--context-menu-item-hover);
        border: 1px solid var(--context-menu-item-hover);
        color: var(--text-color);
    }

    .modal-buttons {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 10px;
    }
    
	#confirmEmptyTrashBtn, #confirmImportBtn, #confirmRestoreAllTrashBtn {
	    width: 100%;
	    text-align: center;
	    display: flex;
	    align-items: center;
	    justify-content: center;
	    background: var(--card-bg);
	    color: var(--input-text-color);
	}
    
    #folderList {
        padding-right: 5px;
        margin-left: 0;
        margin-right: 0;
    }

    #folderSearchInput {
        background: var(--input-background);
        border: 1px solid var(--input-border-color);
        padding: var(--padding-small);
        border-radius: var(--border-radius);
        display: block;
        margin-bottom: 10px;
        width: 100%;
        z-index: 2;
        font-size: 15px;
        color: #ccc;
    }
    
    #folderSearchInput::placeholder {
      color: #ccc;
    }

    #newFolderNameInput, #editTitleInput, #editUrlInput {
        background: var(--input-background);
        border: 1px solid var(--input-border-color);
        padding: var(--padding-small);
        border-radius: var(--border-radius);
        color: #eee;
        display: block;
        width: 100%;
        z-index: 2;
        font-size: 15px;
    }
    
    #moveBtn:disabled, #createFolderInModalBtn:disabled, #saveEditBtn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }
    
    .modal-close-btn, #moveBtn, #createFolderInModalBtn, #saveEditBtn, #cancelEditBtn {
        border-radius: var(--border-radius);
        border: none;
        cursor: pointer;
        display: flex;
        gap: var(--gap-small);
        align-items: center;
        background: var(--primary-button-background);
        color: var(--primary-button-text);
        transition: 0.2s background;
        padding: var(--padding-small);
        width: 100%;
        justify-content: center;
    }
    
    .modal-close-btn:hover, #closeCreateFolderModal:hover, #moveBtn:hover, #cancelOpenAllBtn:hover, #closeMoveModal:hover, #createFolderInModalBtn:hover, #saveEditBtn:hover, #cancelEditBtn:hover, #cancelEmptyTrashBtn:hover, #cancelImportBtn:hover {
      background: var(--secondary-button-background);
      color: var(--input-text-color);
    }
    
    #cancelEditBtn {
        background: transparent;
        color: #eee;
        border: 1px solid var(--border-color);
    }
    
    #cancelEditBtn:hover {
        background: var(--border-color);
    }
    
    a[href="#"] {
      pointer-events: auto;
      cursor: pointer;
    }

    li.folder-item a {
      -webkit-user-select: none;
      user-select: none;
    }
    
    .scroll-to-top {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translate(-50%, 100px);
        width: 40px;
        height: 40px;
        background: var(--bg-color);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        opacity: 0;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        z-index: 100;
        pointer-events: none;
        border: 1px solid var(--border-color);
        background: var(--background-color);
    }

    .scroll-to-top.active {
        transform: translate(-50%, 0);
        opacity: 1;
        pointer-events: all;
    }

    .scroll-to-top.hiding {
        transform: translate(-50%, 100px);
        opacity: 0;
        pointer-events: none;
    }

	ul.grid-mode {
		display: grid;
		grid-template-columns: repeat(3, minmax(0, 1fr));
		gap: 8px;
		align-content: start;
		overflow-y: auto;
		overflow-x: hidden;
	}

    ul.grid-mode li.bookmark-item,
    ul.grid-mode li.folder-item {
      position: relative;
      border-radius: 14px;
      overflow: visible;
    }

    ul.grid-mode li > a {
      display: flex !important;
      flex-direction: column !important;
      align-items: center !important;
      justify-content: flex-start !important;
      padding: 12px 6px 10px !important;
      border-bottom: none !important;
      border-radius: 14px !important;
      gap: 6px !important;
      min-height: 82px !important;
      text-align: center !important;
      transition: background 0.18s, transform 0.15s !important;
    }
    

    ul.grid-mode li > a:hover {
      background: var(--card-hover-bg) !important;
    }

    ul.grid-mode li .bookmark-url,
    ul.grid-mode li .folder-count {
      display: none !important;
    }

    li .grid-icon-wrap,
    li .grid-label {
      display: none !important;
    }

    ul.grid-mode li .item-icon,
    ul.grid-mode li .bookmark-content {
      display: none !important;
    }

    ul.grid-mode li .grid-icon-wrap,
    ul.grid-mode li .grid-label {
      display: flex !important;
    }

    ul.grid-mode li .grid-label {
      display: block !important;
    }

	ul.grid-mode li .grid-icon-wrap {
	    width: 40px;
	    height: 40px;
	    border-radius: 12px;
	    background: var(--border-color);
	    display: flex;
	    align-items: center;
	    justify-content: center;
	    flex-shrink: 0;
	}

	ul.grid-mode li .grid-folder-collage {
		display: grid !important;
		grid-template-columns: 1fr 1fr;
		grid-template-rows: 1fr 1fr;
		gap: 2px;
		padding: 5px;
	}

    ul.grid-mode li .collage-cell {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--border-color);
      border-radius: 3px;
      overflow: hidden;
    }

    ul.grid-mode li .collage-cell img {
      width: 100% !important;
      height: 100% !important;
      border-radius: 0 !important;
      object-fit: cover;
    }

    ul.grid-mode li .grid-icon-wrap img {
      width: 22px;
      height: 22px;
      border-radius: 4px;
    }

    ul.grid-mode li .grid-icon-wrap svg {
      width: 20px;
      height: 20px;
      opacity: 0.7;
    }

    ul.grid-mode li .grid-icon-wrap {
      position: relative;
    }

	ul.grid-mode li .grid-folder-badge {
	    position: absolute;
	    top: -5px;
	    right: -5px;
	    min-width: 16px;
	    height: 16px;
	    display: flex;
	    align-items: center;
	    justify-content: center;
	    line-height: 1;
	    font-size: 12px;
	    color: var(--link-color);
	    background: var(--background-color);
	    padding: 3px 5px;
	    border-radius: 15px;
	}

	ul.grid-mode li .grid-label {
	    font-size: 11px;
	    color: var(--text-color);
	    white-space: nowrap;
	    overflow: hidden;
	    text-overflow: ellipsis;
	    width: 100%;
	    min-width: 0;
	    text-align: center;
	    line-height: 1.3;
	    padding: 0 4px;
	}

    ul.grid-mode li .bookmark-buttons {
      position: absolute !important;
      top: 0px !important;
      left: 0px !important;
      right: auto !important;
      transform: none !important;
      height: 22px !important;
      width: 22px !important;
      background: var(--background-color) !important;
      border-radius: 50% !important;
      border: 1.5px solid var(--border-color) !important;
      display: none !important;
      align-items: center !important;
      justify-content: center !important;
    }

    .toggle-track {
      width: 42px;

      border-radius: 12px;
      position: relative;
      transition: background 0.22s;
      display: block;

      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 18px;
      height: 18px;
      background: #fff;
      border-radius: 50%;

            <button class="theme-btn setting-btn" data-setting="trashExpiry" data-value="7"><span data-i18n="trashExpiry7Days">7 days</span></button>
            <button class="theme-btn setting-btn" data-setting="trashExpiry" data-value="30"><span data-i18n="trashExpiry1Month">1 month</span></button>
          </div>
        </div>
      </div>
      <div class="settings-row settings-row--theme">
        <span class="settings-label" data-i18n="settingBookmarksLabel">Bookmarks</span>
        <div class="theme-btn-group">
          <button class="theme-btn setting-btn" data-setting="view" data-value="list"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-layout-list"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 6a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v2a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -2" /><path d="M4 16a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v2a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2l0 -2" /></svg><span data-i18n="settingViewList">List</span></button>
          <button class="theme-btn setting-btn" data-setting="view" data-value="grid"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-layout-grid"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 5a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -4" /><path d="M14 5a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -4" /><path d="M4 15a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -4" /><path d="M14 15a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v4a1 1 0 0 1 -1 1h-4a1 1 0 0 1 -1 -1l0 -4" /></svg><span data-i18n="settingViewGrid">Grid</span></button>
        </div>
      </div>
      <div class="settings-row settings-row--theme">
        <span class="settings-label" data-i18n="settingFolderStyleLabel">Folder style</span>
        <div class="theme-btn-group">
          <button class="theme-btn setting-btn" data-setting="folderStyle" data-value="icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-folder"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M5 4h4l3 3h7a2 2 0 0 1 2 2v8a2 2 0 0 1 -2 2h-14a2 2 0 0 1 -2 -2v-11a2 2 0 0 1 2 -2" /></svg><span data-i18n="settingFolderStyleIcon">Folder</span></button>
          <button class="theme-btn setting-btn" data-setting="folderStyle" data-value="stack"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-grid-dots"><path stroke="none" d="M0 0h24v24H0z" fill="none" /><path d="M4 5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M11 5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M18 5a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M4 12a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M11 12a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M18 12a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M4 19a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M11 19a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /><path d="M18 19a1 1 0 1 0 2 0a1 1 0 1 0 -2 0" /></svg><span data-i18n="settingFolderStyleStack">Stack</span></button>
        </div>
        <p data-i18n="folderStyleText"></p>
      </div>
      <div class="settings-row">
	      <div class="settings-flex">
	        <span class="settings-label" data-i18n="settingFolderBadgeLabel">Folder badge</span>
	        <label class="toggle-slider">
	          <input type="checkbox" id="settingFolderBadge">
	          <span class="toggle-track"></span>
	        </label>
	      </div>
	      <p data-i18n="folderBadgeText"></p>
      </div>
      <div class="settings-row">
        <span class="settings-label" data-i18n="settingImportExportLabel">Import / Export</span>
        <div class="theme-btn-group data">
          <button id="exportBtn" class="data-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"/><path d="M7 11l5 5l5 -5"/><path d="M12 4l0 12"/></svg>
            <span data-i18n="exportButton">Export</span>
          </button>
          <button id="importBtn" class="data-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2 -2v-2"/><path d="M7 9l5 -5l5 5"/><path d="M12 4l0 12"/></svg>
            <span data-i18n="importButton">Import</span>
          </button>
        </div>
        <input type="file" id="importFileInput" accept=".json" style="display:none">
      </div>
    </div>

    <div id="trashPanel">
      <div class="trash-header">
        <button id="restoreAllTrashBtn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M3.06 13a9 9 0 1 0 .49 -4.087"/><path d="M3 4.001v5h5"/></svg>
        </button>
        <div class="search">
		<svg class="search-svg" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" /><path d="M21 21l-6 -6" /></svg>
		<input type="text" id="trashSearchInput" data-i18n="trashSearchPlaceholder" placeholder="Search trash...">
		<button id="trashSelectBtn">
			<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"></path><path d="M3 12a9 9 0 1 0 18 0a9 9 0 1 0 -18 0"></path><path d="M9 12l2 2l4 -4"></path></svg>
		</button>
        </div>

        <button id="emptyTrashBtn">
		<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7l16 0"/><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"/><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"/></svg>
      </div>
      <ul id="trashList"></ul>
    </div>

    <nav class="bottom-nav">
      <button class="bottom-nav-btn active" id="tabBookmarks">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M9 4h6a2 2 0 0 1 2 2v14l-5 -3l-5 3v-14a2 2 0 0 1 2 -2"/></svg>
      </button>
      <button class="bottom-nav-btn" id="tabTrash">
		<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M4 7l16 0"/><path d="M5 7l1 12a2 2 0 0 0 2 2h8a2 2 0 0 0 2 -2l1 -12"/><path d="M9 7v-3a1 1 0 0 1 1 -1h4a1 1 0 0 1 1 1v3"/></svg>

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path stroke="none" d="M0 0h24v24H0z" fill="none"/><path d="M10.325 4.317c.426 -1.756 2.924 -1.756 3.35 0a1.724 1.724 0 0 0 2.573 1.066c1.543 -.94 3.31 .826 2.37 2.37a1.724 1.724 0 0 0 1.065 2.572c1.756 .426 1.756 2.924 0 3.35a1.724 1.724 0 0 0 -1.066 2.573c.94 1.543 -.826 3.31 -2.37 2.37a1.724 1.724 0 0 0 -2.572 1.065c-.426 1.756 -2.924 1.756 -3.35 0a1.724 1.724 0 0 0 -2.573 -1.066c-1.543 .94 -3.31 -.826 -2.37 -2.37a1.724 1.724 0 0 0 -1.065 -2.572c-1.756 -.426 -1.756 -2.924 0 -3.35a1.724 1.724 0 0 0 1.066 -2.573c-.94 -1.543 .826 -3.31 2.37 -2.37c1 .608 2.296 .07 2.572 -1.065z"/><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"/></svg>
      </button>
    </nav>

    <div id="contextMenuOverlay"></div>

  </body>
